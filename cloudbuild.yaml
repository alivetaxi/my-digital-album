###############################################################################
# Build + deploy pipeline for my-digital-album.
#
# Substitutions (set per Cloud Build trigger — override these defaults):
#   _ENV                — "dev" or "prod"
#   _GCP_PROJECT_ID     — GCP project ID
#   _SERVICE_ACCOUNT    — Cloud Run service account email
#   _MEDIA_BUCKET       — GCS bucket for original media uploads
#   _THUMBNAILS_BUCKET  — GCS bucket for generated thumbnails
#
# Secrets required in Secret Manager:
#   firebase-config-dev   — content of frontend/src/environments/environment.development.ts
#   firebase-config-prod  — content of frontend/src/environments/environment.prod.ts
###############################################################################

steps:
  # ── Backend: run tests ─────────────────────────────────────────────────────
  - id: test-backend
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        cd backend/functions
        pip install --quiet \
          -r api/requirements.txt \
          -r thumbnail/requirements.txt \
          -r requirements-test.txt
        python -m pytest --tb=short
    waitFor: ["-"]

  # ── Frontend: run tests ────────────────────────────────────────────────────
  - id: test-frontend
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq chromium
        cd frontend
        npm ci
        CHROME_BIN=/usr/bin/chromium \
          npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox --no-progress
    waitFor: ["-"]

  # ── Frontend: inject Firebase config ──────────────────────────────────────
  - id: inject-firebase-config
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        if [ "$_ENV" = "prod" ]; then
          TARGET="frontend/src/environments/environment.prod.ts"
        else
          TARGET="frontend/src/environments/environment.development.ts"
        fi
        gcloud secrets versions access latest \
          --secret="firebase-config-$_ENV" \
          --project="$PROJECT_ID" > "$$TARGET"
    waitFor: ["-"]

  # ── Frontend: install & build Angular ─────────────────────────────────────
  - id: build-frontend
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend
        npm ci
        if [ "$_ENV" = "prod" ]; then
          npx ng build --configuration=production
        else
          npx ng build --configuration=development
        fi
    waitFor: [inject-firebase-config, test-frontend]

  # ── Frontend: deploy to Firebase Hosting ──────────────────────────────────
  - id: deploy-frontend
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting:$_ENV --project="$PROJECT_ID"
    waitFor: [build-frontend]

  # ── Backend: build images (parallel, only if tests pass) ──────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform=linux/amd64
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/functions-$_ENV/api:$COMMIT_SHA
      - -f
      - backend/functions/api/Dockerfile
      - backend/functions
    waitFor: [test-backend]

  - id: build-thumbnail
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform=linux/amd64
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/functions-$_ENV/thumbnail:$COMMIT_SHA
      - -f
      - backend/functions/thumbnail/Dockerfile
      - backend/functions
    waitFor: [test-backend]

  # ── Backend: push images ───────────────────────────────────────────────────
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: [push, asia-east1-docker.pkg.dev/$PROJECT_ID/functions-$_ENV/api:$COMMIT_SHA]
    waitFor: [build-api]

  - id: push-thumbnail
    name: gcr.io/cloud-builders/docker
    args: [push, asia-east1-docker.pkg.dev/$PROJECT_ID/functions-$_ENV/thumbnail:$COMMIT_SHA]
    waitFor: [build-thumbnail]

  # ── Backend: deploy to Cloud Run ──────────────────────────────────────────
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        apt-get install -y gettext-base > /dev/null
        export DEPLOY_ENV=$_ENV
        export DEPLOY_PROJECT=$_GCP_PROJECT_ID
        export DEPLOY_SERVICE_ACCOUNT=$_SERVICE_ACCOUNT
        export DEPLOY_MEDIA_BUCKET=$_MEDIA_BUCKET
        export DEPLOY_THUMBNAILS_BUCKET=$_THUMBNAILS_BUCKET
        export DEPLOY_IMAGE_TAG=$COMMIT_SHA
        TMP=$$(mktemp)
        envsubst < cloudrun/api.yaml > "$$TMP"
        gcloud run services replace "$$TMP" --region=asia-east1 --project="$PROJECT_ID"
    waitFor: [push-api]

  - id: deploy-thumbnail
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        apt-get install -y gettext-base > /dev/null
        export DEPLOY_ENV=$_ENV
        export DEPLOY_PROJECT=$_GCP_PROJECT_ID
        export DEPLOY_SERVICE_ACCOUNT=$_SERVICE_ACCOUNT
        export DEPLOY_MEDIA_BUCKET=$_MEDIA_BUCKET
        export DEPLOY_THUMBNAILS_BUCKET=$_THUMBNAILS_BUCKET
        export DEPLOY_IMAGE_TAG=$COMMIT_SHA
        TMP=$$(mktemp)
        envsubst < cloudrun/thumbnail.yaml > "$$TMP"
        gcloud run services replace "$$TMP" --region=asia-east1 --project="$PROJECT_ID"
    waitFor: [push-thumbnail]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
