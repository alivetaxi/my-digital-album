<nav class="bottom-nav">
  <a class="nav-item" routerLink="/albums" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Albums</span>
  </a>

  @if (isAuthenticated()) {
    <a class="nav-item" routerLink="/profile" routerLinkActive="active">
      @if (user()?.photoURL) {
        <img class="avatar" [src]="user()!.photoURL!" [alt]="user()!.displayName ?? ''" referrerpolicy="no-referrer" />
      } @else {
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      }
      <span>Profile</span>
    </a>
  } @else {
    <a class="nav-item" routerLink="/login" routerLinkActive="active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span>Sign in</span>
    </a>
  }
</nav>
